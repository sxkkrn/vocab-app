<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語テスト</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  background: #f5f5f5;
}
.container {
  width: 900px;
  max-width: 94%;
  background: white;
  padding: 28px;
  border-radius: 22px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  text-align: center;
}
.top-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 18px;
}
select, button, .link-btn {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid #ccc;
  background: white;
  text-decoration: none;
  color: #222;
}
button {
  background: #4CAF50;
  color: white;
  border: none;
  cursor: pointer;
}
button:hover { background: #45a049; }
#meaning {
  font-size: 32px;
  margin: 28px 0;
  font-weight: 700;
  line-height: 1.5;
}
input {
  width: min(620px, 86%);
  font-size: 24px;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid #ccc;
}
#choices {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.choice-btn {
  padding: 14px;
  font-size: 17px;
  border-radius: 12px;
  border: none;
  background: #eee;
  color: #222;
  cursor: pointer;
}
.choice-btn:hover { background: #ddd; }
#result {
  font-size: 24px;
  margin-top: 18px;
  min-height: 34px;
}
.sub-note {
  margin-top: 10px;
  color: #666;
  font-size: 14px;
}
@media (max-width: 768px) {
  .container { padding: 20px; }
  #meaning { font-size: 26px; }
  #choices { grid-template-columns: 1fr; }
  input { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <h2>単語テスト</h2>
  <div class="top-bar">
    <select id="langSelect">
      <option value="en">英語</option>
      <option value="de">ドイツ語</option>
    </select>
    <select id="chapterSelect"></select>
    <select id="modeSelect">
      <option value="input">入力モード</option>
      <option value="choice">選択モード</option>
    </select>
    <button onclick="loadWrongWords()">復習</button>
    <a href="list.html" class="link-btn">単語一覧へ</a>
  </div>

  <div id="meaning"></div>
  <div id="choices"></div>
  <input type="text" id="answer" placeholder="スペル入力">
  <div id="result"></div>
  <div class="sub-note">入力モード: Enterで答え合わせ → Enterで次へ / 選択モード: タップで自動で次へ</div>
</div>

<script src="words_en.js"></script>
<script src="words_de.js"></script>
<script>
const data = { en: words_en, de: words_de };
let currentLang = "en";
let chapters = [];
let currentChapter = 0;
let currentIndex = 0;
let isAnswered = false;
let availableVoices = [];
let wrongWords = JSON.parse(localStorage.getItem("wrongWords")) || [];

function splitIntoChapters(words, size) {
  const chapters = [];
  for (let i = 0; i < words.length; i += size) chapters.push(words.slice(i, i + size));
  return chapters;
}
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}
function formatMeanings(meanings){
  const list = Array.isArray(meanings) ? meanings : [meanings];
  return list.map((m, i) => `${String.fromCharCode(9312 + i)} ${m}`).join(" / ");
}
function normalizeGerman(text){
  return text
    .toLowerCase()
    .replace(/ä/g, "a")
    .replace(/ö/g, "o")
    .replace(/ü/g, "u")
    .replace(/ß/g, "ss")
    .replace(/\s/g, "");
}
function loadVoices() { availableVoices = speechSynthesis.getVoices(); }
loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

function speak(text){
  speechSynthesis.cancel();
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.rate = 0.9;
  const voices = availableVoices;
  if(currentLang === "de"){
    const germanVoice =
      voices.find(v => v.lang === "de-DE") ||
      voices.find(v => v.lang === "de_DE") ||
      voices.find(v => v.lang.startsWith("de")) ||
      voices.find(v => v.name.toLowerCase().includes("german")) ||
      voices.find(v => v.name.toLowerCase().includes("deutsch"));
    if(germanVoice){ uttr.voice = germanVoice; uttr.lang = germanVoice.lang; }
    else uttr.lang = "de-DE";
  } else {
    const englishVoice = voices.find(v => v.lang === "en-US") || voices.find(v => v.lang.startsWith("en"));
    if(englishVoice){ uttr.voice = englishVoice; uttr.lang = englishVoice.lang; }
    else uttr.lang = "en-US";
  }
  speechSynthesis.speak(uttr);
}

const langSelect = document.getElementById("langSelect");
const chapterSelect = document.getElementById("chapterSelect");
const modeSelect = document.getElementById("modeSelect");
const meaningEl = document.getElementById("meaning");
const choicesDiv = document.getElementById("choices");
const answerEl = document.getElementById("answer");
const resultEl = document.getElementById("result");

modeSelect.addEventListener("change", showWord);
langSelect.addEventListener("change", () => { currentLang = langSelect.value; setupChapters(); });
chapterSelect.addEventListener("change", () => {
  currentChapter = Number(chapterSelect.value);
  currentIndex = 0;
  shuffle(chapters[currentChapter]);
  showWord();
});
answerEl.addEventListener("keydown", (e) => {
  if(modeSelect.value !== "input") return;
  if(e.key === "Enter"){
    if(!isAnswered){ checkAnswer(); isAnswered = true; }
    else { nextWord(); isAnswered = false; }
  }
});

function setupChapters() {
  chapters = splitIntoChapters(data[currentLang], 100);
  chapterSelect.innerHTML = "";
  chapters.forEach((_, i) => {
    const op = document.createElement("option");
    op.value = i;
    op.textContent = `第${i + 1}章`;
    chapterSelect.appendChild(op);
  });
  currentChapter = 0;
  currentIndex = 0;
  if (chapters.length > 0) shuffle(chapters[0]);
  showWord();
}

function createChoices(correctWord){
  const all = data[currentLang];
  const correctList = Array.isArray(correctWord.jp) ? correctWord.jp : [correctWord.jp];
  const correctMeaning = correctList[Math.floor(Math.random() * correctList.length)];
  const dummy = [];
  while(dummy.length < 3 && all.length > 3){
    const randWord = all[Math.floor(Math.random() * all.length)];
    if(randWord.en === correctWord.en) continue;
    const randList = Array.isArray(randWord.jp) ? randWord.jp : [randWord.jp];
    const randMeaning = randList[Math.floor(Math.random() * randList.length)];
    if(randMeaning !== correctMeaning && !dummy.includes(randMeaning)) dummy.push(randMeaning);
  }
  const choices = [correctMeaning, ...dummy];
  shuffle(choices);
  return choices;
}

function showWord() {
  const word = chapters[currentChapter]?.[currentIndex];
  if(!word){
    meaningEl.textContent = "単語データがありません";
    choicesDiv.innerHTML = "";
    answerEl.style.display = "none";
    return;
  }
  resultEl.textContent = "";
  resultEl.style.color = "";
  if(modeSelect.value === "input"){
    meaningEl.textContent = formatMeanings(word.jp);
    answerEl.style.display = "inline-block";
    answerEl.style.pointerEvents = "auto";
    answerEl.value = "";
    choicesDiv.innerHTML = "";
    answerEl.focus();
  } else {
    meaningEl.textContent = word.en;
    answerEl.style.display = "none";
    answerEl.style.pointerEvents = "none";
    answerEl.value = "";
    const choices = createChoices(word);
    choicesDiv.innerHTML = "";
    choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.textContent = choice;
      btn.className = "choice-btn";
      btn.onclick = () => handleChoice(choice, word);
      choicesDiv.appendChild(btn);
    });
  }
  isAnswered = false;
}

function checkAnswer() {
  const inputRaw = answerEl.value.trim().toLowerCase();
  const word = chapters[currentChapter][currentIndex];
  let isCorrect = false;
  if(currentLang === "de") isCorrect = normalizeGerman(inputRaw) === normalizeGerman(word.en);
  else isCorrect = inputRaw === word.en.toLowerCase();

  if (isCorrect) {
    resultEl.textContent = "⭕ 正解";
    resultEl.style.color = "green";
  } else {
    resultEl.textContent = `❌ ${word.en}`;
    resultEl.style.color = "red";
    if (!wrongWords.some(w => w.en === word.en)) {
      wrongWords.push(word);
      localStorage.setItem("wrongWords", JSON.stringify(wrongWords));
    }
  }
  speak(word.en);
}

function handleChoice(selected, word){
  const meanings = Array.isArray(word.jp) ? word.jp : [word.jp];
  if(meanings.includes(selected)) {
    resultEl.textContent = "⭕ 正解";
    resultEl.style.color = "green";
  } else {
    resultEl.textContent = `❌ ${formatMeanings(word.jp)}`;
    resultEl.style.color = "red";
    if (!wrongWords.some(w => w.en === word.en)) {
      wrongWords.push(word);
      localStorage.setItem("wrongWords", JSON.stringify(wrongWords));
    }
  }
  speak(word.en);
  setTimeout(() => nextWord(), 800);
}

function nextWord() {
  currentIndex++;
  if (currentIndex >= chapters[currentChapter].length) {
    currentIndex = 0;
    shuffle(chapters[currentChapter]);
  }
  showWord();
}

function loadWrongWords(){
  if(wrongWords.length === 0){ alert("まだミスはありません"); return; }
  chapters = [wrongWords];
  currentChapter = 0;
  currentIndex = 0;
  chapterSelect.innerHTML = "<option value='0'>復習</option>";
  shuffle(chapters[0]);
  showWord();
}

setupChapters();
</script>
</body>
</html>
